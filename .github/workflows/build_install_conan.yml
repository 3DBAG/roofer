name: Build and Install (Conan)

on:
  push:
    tags:
      - "v*"
  pull_request:
    branches: ["develop"]
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, windows-2022, macos-15]
        build_type: [Release]
    uses: ./.github/workflows/conan-build.yml
    with:
      runs_on: ${{ matrix.os }}
      build_type: ${{ matrix.build_type }}
      build_apps: true
      use_spdlog: true
      use_val3dity: false
      build_bindings: false
      build_testing: true
      build_doc_helper: false
      run_tests: true
      artifact_suffix: build
