name: Documentation

on:
  push:
    branches:
      - "main"
  pull_request:
    branches: ["develop"]

jobs:
  build:
    uses: ./.github/workflows/conan-build.yml
    with:
      runs_on: ubuntu-24.04
      build_type: Release
      python_version: "3.13"
      build_jobs: 4
      build_apps: false
      use_spdlog: false
      use_val3dity: false
      build_bindings: true
      build_testing: false
      build_doc_helper: true
      run_tests: false
      artifact_suffix: docs

  generate:
    name: Generate documentation
    runs-on: ubuntu-latest
    needs: build

    env:
      UV_CACHE_DIR: /tmp/.uv-cache

    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v5

      - name: Restore uv cache
        uses: actions/cache@v5
        with:
          path: /tmp/.uv-cache
          key: uv-${{ runner.os }}-${{ hashFiles('uv.lock') }}
          restore-keys: |
            uv-${{ runner.os }}-${{ hashFiles('uv.lock') }}
            uv-${{ runner.os }}

      - name: Download Conan build artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.build.outputs.artifact_name }}
          path: ${{ github.workspace }}

      - name: Restore doc-helper execute bit
        shell: bash
        run: |
          chmod +x install/bin/doc-helper
          chmod +x build/apps/roofer-app/doc-helper

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install docs tooling
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y doxygen
          python -m pip install --upgrade pip uv

      - name: Sync Python dependencies
        shell: bash
        run: uv sync --frozen

      - name: Generate Docs
        shell: bash
        run: |
          uv run -- make -C docs html

      - name: Upload documentation artifact
        uses: actions/upload-artifact@v6
        with:
          name: docs-html
          path: ${{ github.workspace }}/docs/_build/html
          retention-days: 7

  deploy:
    name: Publish documentation
    runs-on: ubuntu-latest
    needs: generate
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    permissions:
      contents: write

    steps:
      - name: Download documentation artifact
        uses: actions/download-artifact@v4
        with:
          name: docs-html
          path: ${{ github.workspace }}/docs-html

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ${{ github.workspace }}/docs-html
          # destination_dir: dev
          publish_branch: gh-pages
