name: Documentation

on:
  push:
    branches:
      - "main"
  pull_request:
    branches: ["develop"]

jobs:
  build:
    uses: ./.github/workflows/conan-build.yml
    with:
      runs_on: ubuntu-22.04
      build_type: Release
      build_preset: gh-Linux
      build_apps: false
      use_spdlog: false
      use_val3dity: false
      build_bindings: true
      build_testing: false
      build_doc_helper: true
      run_tests: false
      artifact_suffix: docs

  deploy:
    name: Build and publish documentation
    runs-on: ubuntu-latest
    needs: build

    env:
      UV_CACHE_DIR: /tmp/.uv-cache

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v5

      - name: Restore uv cache
        uses: actions/cache@v5
        with:
          path: /tmp/.uv-cache
          key: uv-${{ runner.os }}-${{ hashFiles('uv.lock') }}
          restore-keys: |
            uv-${{ runner.os }}-${{ hashFiles('uv.lock') }}
            uv-${{ runner.os }}

      - name: Download Conan build artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.build.outputs.artifact_name }}
          path: ${{ github.workspace }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install docs tooling
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y doxygen
          python -m pip install --upgrade pip uv

      - name: Sync Python dependencies
        shell: bash
        run: uv sync --frozen

      - name: Generate Docs
        shell: bash
        run: |
          uv run -- make -C docs html

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ${{ github.workspace }}/docs/_build/html
          # destination_dir: dev
          publish_branch: gh-pages
